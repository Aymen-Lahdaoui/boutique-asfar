# Application Name
spring.application.name=asfar-boutique

# H2 Database Config (File-Based - Données persistantes)
# Les données sont sauvegardées dans un fichier local sur le disque
spring.datasource.url=jdbc:h2:file:./data/asfardb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (Accessible à http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
spring.h2.console.settings.trace=false

# Port d'écoute du serveur
server.port=8082

# Chargement automatique des données de test (seulement à la première création)
spring.sql.init.mode=never
spring.sql.init.data-locations=classpath:data.sql
spring.jpa.defer-datasource-initialization=true

# Log level
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

